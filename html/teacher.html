<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Smart School Information System</h1>
        <p>Manage Students, Attendance, and Fees Easily</p>
    </header>

    <!-- Navigation -->
    <nav>
        <button onclick="showSection('students')">Students</button>
        <button onclick="showSection('attendance')">Attendance</button>
        <button onclick="showSection('fees')">Fees</button>
    </nav>

    <!-- Students Section -->
    <section id="students" class="active">
        <h2>Student List</h2>
        <input type="text" id="studentName" placeholder="Enter student name">
        <button onclick="addStudent()">Add Student</button>
        <ul id="studentList"></ul>
    </section>

    <!-- Attendance Section -->
    <section id="attendance">
        <h2>Attendance</h2>
        <p>Mark attendance for students</p>
        <button onclick="markAttendance()">Mark Present</button>
        <p id="attendanceStatus"></p>
    </section>

    <!-- Fees Section -->
    <section id="fees">
        <h2>Fees Payment</h2>
        <input type="number" id="feeAmount" placeholder="Enter amount">
        <button onclick="payFees()">Pay</button>
        <p id="feeStatus"></p>
    </section>

    <script src="script.js"></script>
</body>
</html>

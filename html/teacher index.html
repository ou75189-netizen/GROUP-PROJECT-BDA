<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Module</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 5px;
}

button {
  padding: 8px 12px;
  margin: 5px;
  cursor: pointer;
}

.primary { background: blue; color: white; }
.secondary { background: green; color: white; }

input, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="container">
  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('attendance')">Attendance</button>
  <button onclick="show('grades')">Grades</button>
  <button onclick="show('announce')">Announcements</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container">
  <div class="card">
    <h2>Dashboard</h2>
    <p id="avg">Average: ...</p>
  </div>
</div>

<!-- ATTENDANCE -->
<div id="attendance" class="container" style="display:none;">
  <h2>Attendance</h2>
  <form id="attForm">
    <div id="students"></div>
    <button class="primary">Save</button>
  </form>
  <p id="attMsg"></p>
</div>

<!-- GRADES -->
<div id="grades" class="container" style="display:none;">
  <h2>Grades</h2>
  <form id="gradeForm">
    <input id="name" placeholder="Student name">
    <input id="score" placeholder="Score (0-100)">
    <textarea id="comment" placeholder="Comment"></textarea>
    <button class="primary">Save</button>
  </form>
  <p id="gradeMsg"></p>
</div>

<!-- ANNOUNCEMENTS -->
<div id="announce" class="container" style="display:none;">
  <h2>Announcements</h2>
  <form id="annForm">
    <textarea id="text" placeholder="Write message"></textarea>
    <button class="secondary">Post</button>
  </form>
  <p id="annMsg"></p>
</div>

<script>
// NAVIGATION
function show(page){
  document.querySelectorAll(".container").forEach(d => d.style.display="none");
  document.getElementById(page).style.display="block";
}

// DATA
const students = ["Ali","Fatou","Lamin"];

// LOAD STUDENTS
const container = document.getElementById("students");
students.forEach((s,i)=>{
  container.innerHTML += `
    ${s}
    <input type="radio" name="s${i}" value="P">P
    <input type="radio" name="s${i}" value="A">A
    <br>
  `;
});

// SAVE ATTENDANCE
document.getElementById("attForm").onsubmit = function(e){
  e.preventDefault();

  let data = [];
  students.forEach((s,i)=>{
    let val = document.querySelector(`input[name="s${i}"]:checked`);
    if(val) data.push({name:s, status:val.value});
  });

  localStorage.setItem("attendance", JSON.stringify(data));
  document.getElementById("attMsg").innerText = "Saved!";
};

// SAVE GRADES
document.getElementById("gradeForm").onsubmit = function(e){
  e.preventDefault();

  let name = document.getElementById("name").value;
  let score = parseInt(document.getElementById("score").value);

  if(score<0 || score>100){
    alert("Invalid score");
    return;
  }

  let grades = JSON.parse(localStorage.getItem("grades")) || [];
  grades.push({name, score});

  localStorage.setItem("grades", JSON.stringify(grades));

  document.getElementById("gradeMsg").innerText = "Saved!";
};

// SAVE ANNOUNCEMENTS
document.getElementById("annForm").onsubmit = function(e){
  e.preventDefault();

  let text = document.getElementById("text").value;

  let data = JSON.parse(localStorage.getItem("announcements")) || [];
  data.push({text});

  localStorage.setItem("announcements", JSON.stringify(data));

  document.getElementById("annMsg").innerText = "Posted!";
};

// LOAD AVERAGE
function loadAvg(){
  let grades = JSON.parse(localStorage.getItem("grades")) || [];

  if(grades.length===0){
    document.getElementById("avg").innerText="No data";
    return;
  }

  let total = 0;
  grades.forEach(g=> total+=g.score);

  document.getElementById("avg").innerText =
    "Average: " + (total/grades.length).toFixed(1);
}

loadAvg();
</script>

</body>
</html>
